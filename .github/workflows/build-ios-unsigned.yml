# Gradi NEPOTPISANI .ipa na GitHubovom macOS runneru (besplatno).
# Pokreće se ručno: Actions -> "Build unsigned iOS IPA" -> Run workflow.
# Rezultat se skida kao artifact i potpisuje Sideloadlyjem na Windowsu.
#
# NAPOMENA: macOS runneri troše GitHub Actions minute 10x brže od Linuxa.
# Besplatnih 2000 min/mj = ~200 min macOS-a = ~8-10 buildova mjesečno.
# Ako je repo PUBLIC, minute su neograničene i besplatne.

name: Build unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.4.1
        # Jedan od Expo SPM paketa zahtijeva Swift tools 6.2, koji dolazi
        # tek s Xcode 26 generacijom (Xcode 16.x nosi Swift 6.1 i puca s
        # "Could not resolve package dependencies: ... Swift tools 6.2.0").
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # --legacy-peer-deps: expo-router povlači web-only pakete (radix-ui, vaul)
        # čiji peer dependency zahtjev za react/react-dom zna biti nekoliko
        # patch-verzija ispred onoga što je stvarno instalirano. Ne utječe
        # na iOS build (ti paketi se koriste samo za expo-router web target).
        run: npm install --legacy-peer-deps

      - name: Expo prebuild (generira native ios/ projekt)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Build (bez potpisivanja)
        working-directory: ios
        run: |
          set -e
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          SCHEME="${WORKSPACE%.xcworkspace}"
          echo "Workspace: $WORKSPACE | Scheme: $SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Zapakiraj u .ipa
        run: |
          set -e
          PRODUCTS="ios/build/Build/Products/Release-iphoneos"
          APP=$(find "$PRODUCTS" -maxdepth 1 -name "*.app" | head -n 1)
          echo "App: $APP"
          mkdir -p "$PRODUCTS/Payload"
          cp -R "$APP" "$PRODUCTS/Payload/"
          cd "$PRODUCTS"
          zip -qry RadniDnevnik-unsigned.ipa Payload
          ls -lh RadniDnevnik-unsigned.ipa

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: RadniDnevnik-unsigned-ipa
          path: ios/build/Build/Products/Release-iphoneos/RadniDnevnik-unsigned.ipa
          retention-days: 30
